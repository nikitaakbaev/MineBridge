name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
          - os: ubuntu-22.04
            target: linux

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint & test
        run: |
          ruff check .
          pytest -q

      - name: Install npm deps
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Build bundled backend
        run: npm run build:backend

      - name: Build installer (no publish)
        run: npx electron-builder --${{ matrix.target }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minebridge-${{ matrix.target }}
          path: |
            dist-installer/*.exe
            dist-installer/*.AppImage
            dist-installer/*.deb
            dist-installer/latest*.yml
          if-no-files-found: ignore

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/latest*.yml
          generate_release_notes: true
